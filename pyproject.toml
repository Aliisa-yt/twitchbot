[project]
name = "twitchbot"
version = "1.8.5-beta"
description = "A Twitch chatbot built with Python, designed to enhance viewer engagement and provide interactive features for Twitch streamers."
authors = [{ name = "Allisa_yt" }]
requires-python = ">=3.13"
readme = "README.md"
license = { file = "LICENSE" }
dependencies = [
    "aiohappyeyeballs==2.6.1",
    "aiohttp==3.13.5",
    "aiosignal==1.4.0",
    "altgraph==0.17.5",
    "anyio==4.13.0",
    "attrs==26.1.0",
    "certifi==2026.2.25",
    "cffi==2.0.0",
    "charset-normalizer==3.4.7",
    # click==8.1.8
    "colorama==0.4.6",
    "coverage==7.13.5",
    "cryptography==46.0.7",
    "dataclasses-json==0.6.7",
    "deepl==1.30.0",
    "emoji==2.15.0",
    "flatbuffers==25.12.19",
    "frozenlist==1.8.0",
    "google-api-core==2.30.2",
    "google-api-python-client==2.193.0",
    "google-api-python-client-stubs==1.34.0",
    "google-auth==2.49.1",
    "google-auth-httplib2==0.3.1",
    "google-cloud-core==2.5.1",
    "google-cloud-speech==2.38.0",
    "google-cloud-translate==3.25.0",
    "googleapis-common-protos==1.74.0",
    "grpc-google-iam-v1==0.14.4",
    "grpcio==1.80.0",
    "grpcio-status==1.80.0",
    "gTTS==2.5.4",
    "h11==0.16.0",
    "httplib2==0.31.2",
    "idna==3.11",
    "iniconfig==2.3.0",
    "librt==0.8.1",
    # marshmallow==3.26.2
    # mpmath==1.3.0
    "multidict==6.7.1",
    "mypy==1.20.0",
    "mypy_extensions==1.1.0",
    "numpy==2.4.4",
    "onnxruntime==1.24.4",
    "packaging==26.0",
    "pathspec==1.0.4",
    "pefile==2024.8.26",
    "pluggy==1.6.0",
    "propcache==0.4.1",
    "proto-plus==1.27.2",
    # protobuf==6.33.6
    "pyasn1==0.6.3",
    "pyasn1_modules==0.4.2",
    "pycparser==3.0",
    "Pygments==2.20.0",
    "pyinstaller==6.19.0",
    "pyinstaller-hooks-contrib==2026.4",
    "pyparsing==3.3.2",
    "pytest==9.0.2",
    "pytest-asyncio==1.3.0",
    "pywin32; platform_system == 'Windows'",
    "pywin32-ctypes==0.2.3",
    "requests==2.33.1",
    "ruff==0.15.9",
    "setuptools==82.0.1",
    "sounddevice==0.5.5",
    "soundfile==0.13.1",
    "starlette==1.0.0",
    "sympy==1.14.0",
    "twitchio==3.2.1",
    "types-cffi==2.0.0.20260402",
    "types-dataclasses-json==0.5.9",
    "types-grpcio==1.0.0.20251009",
    "types-grpcio-status==1.0.0.20260402",
    "types-httplib2==0.31.2.20260402",
    "types-pyasn1==0.6.0.20260402",
    "types-pywin32==311.0.0.20260402",
    "types-PyYAML==6.0.12.20250915",
