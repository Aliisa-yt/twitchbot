[project.scripts]
twitchbot = "twitchbot:run_main"
setup_tokens = "setup_tokens:run_main"

[tool.setuptools]
package-dir = { "" = "src" }
py-modules = ["twitchbot", "setup_tokens"]

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
src = ["src", "tests"]

# Excluded directories and files
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    ".github",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    ".coveragerc",
]

# Formatter Settings
line-length = 120
indent-width = 4
target-version = "py313"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",
    "ANN",
    "ERA001",
    "T201",
    "FBT003",
    "PLR0913",
    "PLR2004",
    "RUF001",
    "RUF002",
    "RUF003",
    "RUF100",
    "E741",
    "COM812",
    "TD002",
    "TD003",
    "FIX002",
    "TRY301",
    "TRY400",
    "S101",
    "S105",
    "UP036",
]
fixable = ["ALL"]
unfixable = []
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
extend-per-file-ignores = { "tests/**/*" = [
    "INP001",
    "S106",
    "S108",
    "SLF001",
] }

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"
docstring-code-format = true

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.mypy]
mypy_path = "src"
files = ["src"]
python_version = "3.13"
exclude = ["dic/.*", "tests/.*"]
explicit_package_bases = true
warn_redundant_casts = true
warn_return_any = true
warn_unreachable = false
warn_unused_configs = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = [
    "soundfile.*",
    "sounddevice.*",
    "gtts.*",
    "google.cloud.*",
    "onnxruntime.*",
]
ignore_missing_imports = true
# follow_untyped_imports = true
# follow_imports = "silent"

[tool.pytest.ini_options]
addopts = "-ra"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore:There is no current event loop:DeprecationWarning",
    "ignore:coroutine .* was never awaited:RuntimeWarning",
]

[tool.coverage.run]
source = ["core", "handlers", "utils", "config", "models"]
omit = [
    "tests/*",
    "*/__pycache__/*",
    "*/.venv/*",
    "*/site-packages/*",
    "twitchbot.py",
]
branch = true

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "def __str__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.coverage.html]
directory = "htmlcov"

[tool.pylance]
exclude = [
    "**/.*",
    "**/.venv/**",
    "**/site-packages/**",
    "**/__pycache__/**",
    "**/node_modules/**",
    "**/dist/**",
    "**/build/**",
    "**/lib/**",
]

typeCheckingMode = "basic"

reportUnusedImport = true
reportUnusedVariable = true
reportGeneralTypeIssues = true

reportMissingImports = true
reportDuplicateImport = true

extraPaths = ["."]
